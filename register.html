<!DOCTYPE html>
<html>
<head>
<title>Register</title>
<link rel="stylesheet" href="style.css">
</head>

<body style="background-image:url(images/registration.jpg);height:100vh;display:flex;justify-content:center;align-items:center;">

<div class="box-1">

<h2>Create Account</h2>

<input type="text" id="name" placeholder="Name"><br>
<input type="email" id="regEmail" placeholder="Email"><br>
<input type="password" id="regPassword" placeholder="Password"><br>

<input type="text" id="blood" placeholder="Blood Group"><br>
<input type="text" id="location" placeholder="Location"><br>
<input type="text" id="phone" placeholder="Phone Number"><br>

<button onclick="register()">Register</button>

<p>
Already have an account?
<a href="/blood-group/index.html">Login</a>
</p>

</div>

<script src="script.js"></script>

</body>
</html>
