<h2>Donate Blood</h2>
<div class="donate-form">
<input type="text" placeholder="Your Name" required><br>
<select required>
    <option>Select Your Blood Group</option>
    <option>A+</option>
    <option>B+</option>
    <option>AB+</option>
    <option>O+</option>
</select><br>

<input type="text" placeholder="Location"><br>
<input type="text" placeholder="Phone Number"><br>


<select>
    <option>Are You Eligible?</option>
    <option>Yes</option>
    <option>No</option>
</select><br>

<input type="date" placeholder="Last Donation Date"><br>
<textarea placeholder="Any Health Issues?"></textarea><br>

<select>
    <option>Available for Donation</option>
    <option>Yes</option>
    <option>No</option>
</select><br>

<button type="button" onclick="getLocation()">Use My LOCATION</button><br><br>

<button  type="button" onclick="handleDonate()">Donate Now</button><br><br>

</div>

    </footer>
